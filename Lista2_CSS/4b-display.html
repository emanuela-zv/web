<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4b-Display</title>

    <style>
        /**reset CSS */
        *{margin: 0px; padding: 0px;}

        body{
            min-height: 100vh;
        }

        .box{
            border: 1px solid black;
            box-sizing: border-box;
            height: 40vh;
            width: 25vw;
            display: inline-block;
            text-align: center;
            line-height: 40vh;
        }

        #box1{
            background-color: blue;

        }

        #box2{
            background-color: green;
        }

        #box3{
            background-color: red;
        }

        #box4{
            background-color: yellow;
        }

    </style>

</head>
<body>

<!--Deixar um do lado do outro para não ter espaços entre os blocos-->
<div id="box1" class="box">1</div><div id="box2" class="box">2</div><div id="box3" class="box">3</div><div id="box4" class="box">4</div>
    
</body>
</html>
