<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4b-Display</title>

    <style>
        /**reset CSS */
        *{margin: 0px; padding: 0px;}

        body{
            min-height: 100vh;
        }

        /* A explicação do porquê os elementos serem dispostos de tal forma na tela se dá por meio dos comentários explicativos de cada estilização utilizada.Aquelas que não constam explicação, são similares à questão 4a-display. */
        
        .box{
            border: 1px solid black;
            box-sizing: border-box; /* Define que o tamanho final do box será o tamanho definido (o height e o width)*/
            height: 40vh;
            width: 25vw; /*Determina que o box deve usar 25% da largura da tela (devido ao vw)*/
            display: inline-block; /* Define que o box deve ser posicionado um ao lado do outro e também em blocos. Ou seja, quando acabar o espaço na linha, o próximo elemento deve ir para a linha de baixo e não continuar para o lado como um scroll.*/
            text-align: center;
            line-height: 40vh;
        }

        #box1{
            background-color: blue;

        }

        #box2{
            background-color: green;
        }

        #box3{
            background-color: red;
        }

        #box4{
            background-color: yellow;
        }

    </style>

</head>
<body>

<div id="box1" class="box">1</div><div id="box2" class="box">2</div><div id="box3" class="box">3</div><div id="box4" class="box">4</div>
    
</body>
</html>
