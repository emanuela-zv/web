<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barquinho</title>

    <style>

        *{margin: 0px; padding: 0px;}

        #barco{
            position: absolute;
            z-index: 2;
            display: inline-block;
            font-size: 100px;
            left: 0;
            bottom: 10vw;
            animation:navegando 10s linear infinite;
            transform: scaleX(-1);

        }

        #ceu{
            position: absolute;
            width: 100vw;   
            height: 100vh;   
            z-index: 0;
            
            background: linear-gradient(lightblue,lightseagreen);
        }

        #sol{
            position: absolute;
            z-index: 1;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: rgb(255, 208, 0);
            bottom:30vh;
            left: 50%;
            transform: translateX(-50%);

        }

        #nuvem{
            position: absolute;
            z-index: 3;
            display: inline-block;
            left: 0;
            top: 5vw;
            width: 100px;
            height: 100px;
            background-color: antiquewhite;
            border-radius: 50px;

            box-shadow:
            100px 0 antiquewhite,
            50px 50px antiquewhite,
            120px 40px antiquewhite,
            160px -5px antiquewhite,
            30px -50px antiquewhite,
            110px -50px antiquewhite;

            animation: nuvem 20s linear infinite;
        }

        .mar{
            position: absolute;
            z-index: 1;
            display: block;
            width: 100vw;
            height: 30vh;
            bottom: 0%;
            background: linear-gradient(circle at center #0077be, #00aaff);
           
        }

        .mar::after{
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(255, 223, 80, 0.877), transparent);
        }
        .mar::before{
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgb(2, 116, 223));
        }
        
        @keyframes navegando {
            
            0% {
                left: -200px;
                transform: rotate(-5deg) scaleX(-1);
            }

            20% {
                transform: rotate(8deg) scaleX(-1);
            }

            40% {
                transform: rotate(-6deg) scaleX(-1);
            }

            60% {
                transform: rotate(7deg) scaleX(-1);
            }

            80%{
                transform: rotate(-5deg) scaleX(-1);
            }

            100% {
                left: 100vw;
                transform: rotate(5deg) scaleX(-1);
            }
        }
        @keyframes nuvem {
            0%{
                left: -200px;
            }
            100%{
                left: 100vw;
            }
            
        }

    </style>

</head>
<body>

    <span id="barco">⛵</span>

    <div class="box" id="ceu"></div>
    <div class="box" id="nuvem"></div>
    <div class="mar"></div>
    <div class="sol" id="sol"></div>
    
</body>
</html>
