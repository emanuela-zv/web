<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barquinho</title>

    <style>

        *{margin: 0px; padding: 0px;}
        #barco{
            position: absolute;
            z-index: 2;
            display: inline-block;
            font-size: 100px;
            left: 0;
            bottom: 0;
            animation:navegando 10s ease-in infinite;

        }

        #ceu.box{
        
            width: 100vw;   /* Largura total da tela */
            height: 100vh;   /* Metade da altura da tela */
            
            background: linear-gradient(lightblue,lightseagreen);
            
            /* Posicionando o "mar" na metade de baixo */
            position: fixed;
            bottom: 0;
        }

            @keyframes navegando{

        0%{}

        40%{transform:rotate(0deg);}
        50%{ left:50vw;
            transform: rotate(-60deg);
        }
        100%{
            transform: rotate(-45deg);
            bottom:100vh;
        }
    }

    </style>

</head>
<body>

    <span id="barco">🚤</span>

    <div class="box" id="ceu"></div>


    
</body>
</html>
