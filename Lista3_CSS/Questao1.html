<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questao 1 Lista 3</title>

    <style>

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {

            display: flex;
            width: 20vw;
            height: 80vh;
            background-color: rgb(255, 255, 255);
            border: 2px solid purple;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
    
        }

        .top, .bottom {

            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 15px;
        }

        .bottom{
            margin-bottom: 20px;
        }

        .logo{
            color: gray;
            font-family: Arial, Helvetica, sans-serif;
        }

        .boxes {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 80%;
        }

        .box {
            background-color: lightgray;
            width: 100%;
            height: 5vh;
            border-radius: 5px;
        }

        .circulo {
            background-color: lightgray;
            width: 60px;
            height: 60px;
            border-radius: 50%;
        }

        .ret {
            background-color: lightgray;
            width: 40%;
            height: 5vh;
            border-radius: 5px;
        }

        #retSup {

            width: 100%;
            height: 2vh;
            border-radius: 0%;

        }
    </style>

</head>

<body>

    <div class="container">

        <div class="top">
            <div class="box" id="retSup"></div>
            <div class="logo">Company Logo</div>

            <div class="boxes">
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
            </div>
        </div>

        <div class="bottom">
            <div class="circulo"></div>
            <div class="ret"></div>
        </div>

    </div>


</body>

</html>
