<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de animação</title>

    <style>

        #coracao{
            display: inline-block;
            font-size: 100px;
            animation: voar 5s linear 0s infinite ;
        }

        img {width: 15vw;
            animation: voar 5s linear 0s infinite ;
        }

        #rocket{
            display: inline-block;
            position: fixed;
            font-size: 50pt;
            bottom: 0px;
            left: 0px;
            transform: rotate(-45deg);
            animation:lancamento 10s ease-in infinite;
        }

        @keyframes lancamento{

            0%{}

            40%{transform:rotate(0deg);}
            50%{ left:50vw;
                transform: rotate(-60deg);
            }
            100%{
                transform: rotate(-45deg);
                bottom:100vh;
            }
        }



        @keyframes voar{

            0%{font-size: 1px;
            transform: rotate(0deg);
            }

            100% {font-size: 1000px;
            transform: rotate(360deg);
            }
        }

    </style>

</head>

<body>

    <span id="coracao">💕</span>
    <img src="./imgs/musa-winx.jpg" alt="">
    <span id="rocket">🚀</span>

</body>
</html>
