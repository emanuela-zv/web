<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>

    <style>

        .container{
            display:grid;
            grid-template-rows: 100px 200px 50vh;
            grid-template-areas:"cabecalho cabecalho cabecalho"
                                "menuSite principal principal"
                                "rodape rodape rodape";
        }

        .box{
            border: 1px solid black;
        }

        #box1{
            grid-area: cabecalho;
        }
        #box2{
            grid-area: menuSite;
        }
        #box3{
            grid-area: principal;
        }
        #box10{
            grid-area: rodape;
        }

    </style>

</head>

<body>
    
    <div class="container">
        <div class="box" id="box1">1 - HEADER</div>
        <div class="box" id="box2">2 - MENU</div>
        <div class="box" id="box3">3 - PRINCIPAL</div>
        <div class="box" id="box4">4</div>
        <div class="box" id="box5">5</div>
        <div class="box" id="box6">6</div>
        <div class="box" id="box7">7</div>
        <div class="box" id="box8">8</div>
        <div class="box" id="box9">9</div>
        <div class="box" id="box10">10 - RODAPÉ</div>
    </div>

</body>
</html>
