<!DOCTYPE html>
<html >

<head>

    <title>Contato</title>

    <style>

        input{
        width: 45%;
        margin-bottom: 2%;
        
        }
        #assunto{
            height: 100px;
            width: 44%;
        }
        #mensagem{
            width: 43%;
            height: 100px;
        }
        #enviar{
            width: 30%;
            height: 40px;
            font-size: large;
            display: block;
            margin: auto;
            background-color: rgb(87, 151, 87);
        }
    </style> 

</head>

<body>

    <thead>
        <h2>Instruções</h2>

        <p>Este formulário tem como objetivo trazer uma oportunidade para assuntos necessários. <br> Portanto, preencha os campos conforme o necessário. <br>Observação: O e-mail é obrigatório!</p>
        
    </thead>

    <tbody>

        <div> 
            <form action=""></form>

            <label for="nome">Nome: </label>
            <input id=nome type="text" placeholder="Informe o seu nome completo">
            <label for="email">Email: </label>
            <input  id=email type="email" name="" id="email" placeholder="seuEmail@gmail.com" required>
            <label for="assunto">Assunto: </label>
            <input id=assunto type="text" placeholder="O que deseja tratar?">

            <label for="estado">Estado: </label>
            <select id="estado">

                <option value="pendente">Pendente</option>
                <option value="resolvido">Resolvido</option>
                <option value="cancelado">Cancelado</option>
            </select>

            <label for="mensagem"><br>Mensagem: </label>
            <input id=mensagem type="text" placeholder="Digite uma mensagem adicional">
        </div>

        <button id="enviar" type="submit">Enviar</button>

    </tbody>

    <tfoot>    

        <details>
            <summary> Menu de navegação</summary>

            <p><a href="./4_curriculo.html">Currículo</a></p>
        </details>

    </tfoot>
    
</body>

</html>
